<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Solo AI Architect Academy — The Ultimate Zero-to-Principal AI Engineering Master Curriculum. 14 phases, 40 months, industry-architect level expertise."/>
  <meta name="theme-color" content="#050810"/>
  <meta property="og:title" content="AI Architect Academy — Zero to Principal Engineer"/>
  <meta property="og:description" content="The definitive Principal AI Engineer blueprint. 14 phases from mathematics to multi-agent systems and enterprise AI governance."/>
  <title>SOLO AI Architect Academy — Zero to Principal Engineer</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
</head>
<body>

<!-- ═══ ANIMATED BACKGROUND ═══ -->
<canvas id="bg-canvas"></canvas>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
</div>
<div class="bg-grid"></div>

<!-- ═══ SIDEBAR OVERLAY ═══ -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ═══ SIDEBAR ═══ -->
<aside id="sidebar" class="sidebar" role="navigation" aria-label="Main Navigation">
  <div class="sidebar-header">
    <button class="sidebar-logo" id="sidebar-home-btn" aria-label="Go to home">
      <div class="sidebar-logo-icon">AI</div>
      <div class="sidebar-logo-text">Solo AI Architect<br>Academy</div>
    </button>
  </div>

  <nav class="sidebar-nav">

    <div class="sidebar-section-label">Navigation</div>

    <button class="sidebar-link" data-nav="home">
      <span class="sidebar-link-icon">🏠</span> Home
    </button>
    <button class="sidebar-link" data-nav="guide">
      <span class="sidebar-link-icon">📖</span> How to Use
    </button>
    <button class="sidebar-link" data-nav="timeline">
      <span class="sidebar-link-icon">🗓️</span> 40-Month Timeline
    </button>
    <button class="sidebar-link" data-nav="strategy">
      <span class="sidebar-link-icon">⚡</span> Execution Directives
    </button>
    <button class="sidebar-link" data-nav="contact">
      <span class="sidebar-link-icon">✉️</span> Contact
    </button>
    <button class="sidebar-link" data-nav="about">
      <span class="sidebar-link-icon">🌐</span> About
    </button>

    <div class="sidebar-section-label" style="margin-top:6px">The 14 Phases</div>

    <div class="sidebar-phase-grid">
      <button class="sidebar-phase-btn" data-phase-nav="1">P01 · Math</button>
      <button class="sidebar-phase-btn" data-phase-nav="2">P02 · Code</button>
      <button class="sidebar-phase-btn" data-phase-nav="3">P03 · Data</button>
      <button class="sidebar-phase-btn" data-phase-nav="4">P04 · ML</button>
      <button class="sidebar-phase-btn" data-phase-nav="5">P05 · DL</button>
      <button class="sidebar-phase-btn" data-phase-nav="6">P06 · CV</button>
      <button class="sidebar-phase-btn" data-phase-nav="7">P07 · NLP</button>
      <button class="sidebar-phase-btn" data-phase-nav="8">P08 · RAG</button>
      <button class="sidebar-phase-btn" data-phase-nav="9">P09 · Agents</button>
      <button class="sidebar-phase-btn" data-phase-nav="10">P10 · BigData</button>
      <button class="sidebar-phase-btn" data-phase-nav="11">P11 · MLOps</button>
      <button class="sidebar-phase-btn" data-phase-nav="12">P12 · Edge</button>
      <button class="sidebar-phase-btn" data-phase-nav="13">P13 · Security</button>
      <button class="sidebar-phase-btn" data-phase-nav="14">P14 · Strategy</button>
    </div>

    <div class="sidebar-section-label" style="margin-top:6px">Stats</div>
    <div class="sidebar-stats">
      <div class="stat-mini"><div class="stat-mini-val">14</div><div class="stat-mini-lbl">Phases</div></div>
      <div class="stat-mini"><div class="stat-mini-val">40</div><div class="stat-mini-lbl">Months</div></div>
      <div class="stat-mini"><div class="stat-mini-val">28+</div><div class="stat-mini-lbl">Projects</div></div>
      <div class="stat-mini"><div class="stat-mini-val">5</div><div class="stat-mini-lbl">Milestones</div></div>
    </div>

  </nav>

  <!-- Theme Switcher -->
  <div class="sidebar-footer">
    <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">Theme</div>
    <div class="theme-selector">
      <button class="theme-btn active" data-theme-btn="dark">🌙 Dark</button>
      <button class="theme-btn" data-theme-btn="light">☀️ Light</button>
      <button class="theme-btn" data-theme-btn="system">⚙ Auto</button>
    </div>
  </div>
</aside>

<!-- ═══ APP ═══ -->
<div class="app-wrapper">
  <div class="main-content">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle sidebar menu" aria-expanded="false">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
        <button class="nav-brand" id="nav-home-btn" aria-label="Go to home">
          <div class="nav-brand-icon">AI</div>
          <span class="nav-brand-text">Solo AI Architect Academy</span>
        </button>
      </div>
      <div class="nav-right">
        <span class="nav-badge">14 PHASES · 40 MONTHS</span>
      </div>
    </nav>

    <!-- Dynamic Page -->
    <main id="main-view" role="main">
      <div style="display:flex;align-items:center;justify-content:center;min-height:80vh">
        <div style="text-align:center;color:var(--text-muted)">
          <div style="font-size:40px;margin-bottom:16px">⚡</div>
          <div style="font-family:var(--font-display);font-size:18px">Initialising...</div>
        </div>
      </div>
    </main>

  </div>
</div>

<script src="main.js"></script>
</body>
</html>
